<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>あいうえお合成</title>
</head>
<body>
  <h1>母音テスト</h1>

  <div>
    <button onclick="playVowel('a')">あ</button>
    <button onclick="playVowel('i')">い</button>
    <button onclick="playVowel('u')">う</button>
    <button onclick="playVowel('e')">え</button>
    <button onclick="playVowel('o')">お</button>
  </div>

  <hr>

  <div>
    <label>音量: <span id="volumeValue">0.3</span></label><br>
    <input type="range" id="volume" min="0" max="1" step="0.01" value="0.3">
  </div>

  <div>
    <label>音程(Hz): <span id="pitchValue">120</span></label><br>
    <input type="range" id="pitch" min="80" max="300" step="1" value="120">
  </div>

  <script src="./main.js"></script>
</body>
</html>
